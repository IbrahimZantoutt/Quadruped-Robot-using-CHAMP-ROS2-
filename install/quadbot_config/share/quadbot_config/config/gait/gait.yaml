/**:
  ros__parameters:
    gait:
      # ">>" = both front and hind knees bend toward the rear (standard mammal).
      # If the robot folds its knees the wrong way when it stands, flip to "<<".
      knee_orientation : ">>"
      pantograph_leg : false
      odom_scaler: 0.9
      # quadbot is small/light, so keep commanded speeds modest to start
      max_linear_velocity_x : 0.3
      max_linear_velocity_y : 0.2
      max_angular_velocity_z : 0.5
      com_x_translation: 0.0
      # swing/stance sized for the 0.14 + 0.14 m legs
      swing_height : 0.04
      stance_depth : 0.0
      stance_duration : 0.25
      # base_link height above ground when standing. Legs reach ~0.28 m fully
      # extended, so 0.18 leaves a comfortable knee bend. Lower this if the
      # robot stands on near-straight legs; raise it if the knees over-fold.
      nominal_height : 0.18
